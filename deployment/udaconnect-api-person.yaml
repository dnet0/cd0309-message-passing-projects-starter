apiVersion: v1
kind: Service
metadata:
  labels:
    service: udaconnect-api-person
  name: udaconnect-api-person
spec:
  ports:
  - name: "5000"
    port: 5000
    targetPort: 5000
    nodePort: 30002
  selector:
    service: udaconnect-api-person
  type: NodePort
---
apiVersion: v1
kind: Service
metadata:
  labels:
    service: udaconnect-api-person
  name: person-service
spec:
  ports:
  - name: "5005"
    port: 5005
    targetPort: 5005
  selector:
    service: udaconnect-api-person
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    service: udaconnect-api-person
  name: udaconnect-api-person
spec:
  replicas: 1
  selector:
    matchLabels:
      service: udaconnect-api-person
  template:
    metadata:
      labels:
        service: udaconnect-api-person
    spec:
      containers:
      - image: johanslat/udaconnect-api-person:v1
        name: udaconnect-api-person
        imagePullPolicy: Always
        env:
        - name: DB_USERNAME
          valueFrom:
            configMapKeyRef:
              name: db-env
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: db-env
              key: DB_NAME
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: db-env
              key: DB_HOST
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: db-env
              key: DB_PORT
      restartPolicy: Always
