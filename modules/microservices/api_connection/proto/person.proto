syntax = "proto3";

package proto;

service PersonService {
    rpc GetAllPersons (Empty) returns (PersonList);
}

message Empty {}

message PersonMessage {
    int32 id = 1;
    string first_name = 2;
    string last_name = 3;
    string company_name = 4;
} 
message PersonList {
    repeated PersonMessage persons = 1;
}